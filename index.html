<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="抄表管理"/>
<meta name="theme-color" content="#ffffff"/>
<title>抄表管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#ebe9e8;
  --text:#1c1917;--text2:#78716c;--text3:#a8a29e;
  --border:#e7e5e4;--border2:#d6d3d1;
  --green:#16a34a;--gbg:#f0fdf4;--gtxt:#15803d;
  --red:#dc2626;--rbg:#fef2f2;--rtxt:#b91c1c;
  --amber:#d97706;--abg:#fffbeb;--atxt:#92400e;
  --blue:#2563eb;
  --r:10px;--rl:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f5f5f0;--text2:#a8a29e;--text3:#57534e;
  --border:#3a3a3c;--border2:#48484a;
  --green:#4ade80;--gbg:#052e16;--gtxt:#4ade80;
  --red:#f87171;--rbg:#450a0a;--rtxt:#f87171;
  --amber:#fbbf24;--abg:#451a03;--atxt:#fbbf24;
  --blue:#60a5fa;
}}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}

/* Header */
#hdr{padding:8px 14px;padding-top:calc(8px + env(safe-area-inset-top));border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.hdr-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hdr-title{font-size:17px;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:4px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sdot.spin{background:var(--amber);animation:blink 1s infinite}
.sdot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.slbl{font-size:11px;color:var(--text3);margin-right:2px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:6px;font-size:20px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.icon-btn:active{background:var(--bg2)}

/* Month bar */
.month-bar{display:flex;align-items:center;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.month-bar::-webkit-scrollbar{display:none}
.mchip{padding:5px 14px;border-radius:999px;border:1px solid var(--border2);background:none;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;flex-shrink:0}
.mchip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.mchip.past{border-style:dashed}
.readonly-banner{background:var(--abg);color:var(--atxt);font-size:12px;font-weight:600;text-align:center;padding:6px;margin:0 -14px;border-bottom:1px solid var(--abg)}
.name-pill{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--bg2);color:var(--text2);border:1px solid var(--border2);cursor:pointer;white-space:nowrap;font-weight:500}

/* Views */
#views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:12px 14px;padding-bottom:calc(66px + env(safe-area-inset-bottom))}
.view.on{display:block}

/* Nav */
#nav{height:calc(54px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);display:flex;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;position:relative;font-family:inherit}
.nb svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.nb.on{color:var(--blue)}
.nbdot{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:999px;font-weight:700;display:none}

/* Overview */
.ov-stat{background:var(--bg2);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px}
.ov-stat h3{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ov-nums{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
.ov-big{font-size:32px;font-weight:700;color:var(--green)}
.ov-rest{font-size:14px;color:var(--text2)}
.ov-rest b{color:var(--red);font-weight:600}
.pbar{height:8px;background:var(--border);border-radius:999px;overflow:hidden}
.pbar-fill{height:100%;border-radius:999px;background:var(--green);transition:width .5s ease}
.pbar-pct{font-size:12px;color:var(--text3);margin-top:5px}
.psec{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px}
.psec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.psec-name{font-size:15px;font-weight:600}
.psec-stat{font-size:13px;color:var(--text2)}
.psec-bar{height:5px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-bottom:10px}
.psec-fill{height:100%;border-radius:999px;background:var(--green);transition:width .5s}
.ar{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ar:last-child{border:none;padding-bottom:0}
.ardot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dg{background:var(--green)}.da{background:var(--amber)}.dr{background:var(--red)}
.ar-name{font-size:13px;flex:1}
.ar-cnt{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums}
.row-btns{display:flex;gap:8px;margin-bottom:10px}
.btn-ghost{flex:1;padding:10px;font-size:13px;background:none;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;color:var(--text);font-family:inherit;font-weight:500}
.btn-ghost:active{background:var(--bg2)}
.btn-danger{color:var(--red);border-color:var(--rbg)}

/* List */
.fbar{display:flex;gap:6px;padding-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.fbar::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:999px;border:1px solid var(--border2);background:none;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.searchbox{position:relative;margin-bottom:10px}
.searchbox input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--border2);border-radius:var(--r);font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.searchbox input:focus{border-color:var(--blue)}
.searchbox svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.shd{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px;padding-left:2px}
.ci{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);margin-bottom:5px;cursor:pointer;background:var(--bg)}
.ci:active{background:var(--bg2)}
.ci.done{opacity:.5}
.ck{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3)}
.ck svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.ck.ok{background:var(--gbg);border-color:var(--green);color:var(--green)}
.ci-body{flex:1;min-width:0}
.ci-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-sub{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;padding:2px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;font-weight:600}
.bg{background:var(--gbg);color:var(--gtxt)}.br{background:var(--rbg);color:var(--rtxt)}.ba{background:var(--abg);color:var(--atxt)}
.empty{text-align:center;color:var(--text3);font-size:14px;padding:40px 0}

/* Scan */
.scan-page{padding:16px 0}
.scan-page p{font-size:14px;color:var(--text2);margin-bottom:16px;text-align:center;line-height:1.6}
.btn-scan{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--rl);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.btn-scan:active{opacity:.85}
.scan-month-note{background:var(--gbg);color:var(--gtxt);font-size:13px;font-weight:600;text-align:center;padding:8px 12px;border-radius:var(--r);margin-bottom:14px}
#vid-wrap{display:none;position:relative;background:#000;border-radius:var(--rl);overflow:hidden;aspect-ratio:1;margin:14px 0}
#vid-wrap video{width:100%;height:100%;object-fit:cover}
.scan-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame div{width:56%;aspect-ratio:1;border:2.5px solid #4ade80;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
#smsg{font-size:13px;color:var(--text2);text-align:center;min-height:20px;margin:4px 0 12px}
.btn-stop{width:100%;padding:11px;background:none;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;cursor:pointer;display:none;font-family:inherit;color:var(--text)}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.manual-label{font-size:13px;color:var(--text2);margin-bottom:8px;display:block}
.manual-row{display:flex;gap:8px}
.manual-row input{flex:1;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;text-transform:uppercase}
.manual-row input:focus{border-color:var(--blue)}
.btn-find{padding:0 16px;background:none;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;cursor:pointer;color:var(--text);font-family:inherit;white-space:nowrap}
.btn-find:active{background:var(--bg2)}

/* Modal */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
#ov.on{display:flex}
#modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:540px}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-name{font-size:18px;font-weight:700;margin-bottom:4px}
.modal-meta{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:18px}
.modal-meta .done-info{color:var(--green);font-weight:600}
.modal-acts{display:flex;gap:8px}
.btn-confirm{flex:1;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--rl);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-confirm:active{opacity:.85}
.btn-cancel{padding:13px 16px;background:none;border:1px solid var(--border2);border-radius:var(--rl);font-size:14px;cursor:pointer;color:var(--text2);font-family:inherit}
.btn-cancel:active{background:var(--bg2)}
.btn-undo{padding:13px 14px;background:var(--rbg);border:1px solid var(--rbg);border-radius:var(--rl);font-size:13px;cursor:pointer;color:var(--rtxt);font-family:inherit;font-weight:600;display:none}

/* Name picker */
#picker{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:110;align-items:center;justify-content:center;padding:20px}
#picker.on{display:flex}
#picker-box{background:var(--bg);border-radius:var(--rl);padding:20px;width:100%;max-width:340px}
#picker-box h2{font-size:17px;font-weight:700;margin-bottom:4px}
#picker-box p{font-size:13px;color:var(--text2);margin-bottom:14px}
.eng-list{display:flex;flex-direction:column;gap:8px}
.eng-btn{padding:13px 16px;border:1px solid var(--border);border-radius:var(--r);background:none;font-size:15px;cursor:pointer;text-align:left;font-family:inherit;color:var(--text);font-weight:500;display:flex;align-items:center;gap:10px}
.eng-btn:active{background:var(--bg2)}
.eng-icon{width:30px;height:30px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-row1">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="hdr-title">⚡ 抄表管理</span>

        </button>

    <div class="month-bar" id="month-bar"></div>

          開啟相機掃描
        </button>

          <video id="qr-vid" autoplay playsinline muted></video>

        </div>
        <div id="smsg"></div>
        <button class="btn-stop" id="btn-stop">停止掃描</button>
        <hr class="divider">
        <label class="manual-label">找不到 QR？手動輸入服務編號</label>
        <div class="manual-row">
          <input id="man-in" type="text" placeholder="HZ-L-001"/>
          <button class="btn-find" id="btn-man">查找</button>
        </div>
      </div>
    </div>
  </div>

  <div id="nav">
    <button class="nb on" data-v="1">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      總覽
    </button>
    <button class="nb" data-v="2">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      清單
      <span class="nbdot" id="nbdot"></span>
    </button>
    <button class="nb" data-v="3">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><line x1="21" y1="16" x2="21" y2="21"/><line x1="16" y1="21" x2="21" y2="21"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
      掃表
    </button>
  </div>
</div>

<!-- Modal -->
<div id="ov" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-meta" id="m-meta"></div>
    <div class="modal-acts">
      <button class="btn-cancel" id="m-cancel">取消</button>
      <button class="btn-undo" id="m-undo">撤銷抄表</button>
      <button class="btn-confirm" id="m-confirm">✓ 確認已抄表</button>
    </div>
  </div>
</div>

<!-- Name picker -->
<div id="picker" onclick="if(event.target===this)this.classList.remove('on')">
  <div id="picker-box">
    <h2>選擇你的名字</h2>
    <p>記錄將以此名字存入雲端</p>
    <div class="eng-list" id="eng-list"></div>
  </div>
</div>

const clients={};
RAW.forEach(r=>clients[r[0]]={id:r[0],person:r[1],area:r[2],name:r[3],note:r[4]});

let myName=localStorage.getItem(LSKEY)||'';
let pendingId=null;
let scanActive=false,scanRaf=null;
let curP='all',curA='all',curS='all';

function isCurrentMonth(){return viewMonth===TODAY_MKEY;}
function getDone(){return doneCache[viewMonth]||{};}
function isDone(id){return!!(getDone()[id]);}

function setSyncState(s,msg){
  document.getElementById('sdot').className='sdot'+(s==='spin'?' spin':s==='err'?' err':'');
  document.getElementById('slbl').textContent=msg||'';
}

function nowTs(){
  const t=new Date();
  return`${t.getMonth()+1}月${t.getDate()}日 ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
}

async function loadCloud(){
  setSyncState('spin','同步中…');
  try{
    const r=await fetch(`${API}?action=getStatus&month=${viewMonth}`);
    const d=await r.json();
    if(d.ok){
      doneCache[viewMonth]=d.done||{};
      renderAll();
      const t=new Date();
      setSyncState('ok',`${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')} 更新`);
    }else setSyncState('err','失敗');
  }catch(e){setSyncState('err','網路錯誤');}
}

async function apiCall(p){
  try{await fetch(API+'?'+new URLSearchParams(p));}catch(e){}
}

// Month bar
function buildMonthBar(){
  const bar=document.getElementById('month-bar');
  bar.innerHTML=MONTHS.map(m=>
    `<button class="mchip ${m.key===viewMonth?'on':''} ${m.key!==TODAY_MKEY?'past':''}"
      data-mkey="${m.key}">${m.key===TODAY_MKEY?'本月 '+m.label:m.year+'年'+m.label}</button>`
  ).join('');
  bar.querySelectorAll('.mchip').forEach(btn=>{
    btn.onclick=()=>{
      viewMonth=btn.dataset.mkey;
      buildMonthBar();
      if(!doneCache[viewMonth])loadCloud();
      else renderAll();
      stopScan();
    };
  });
}

function stats(){
  const done=getDone();
  const a=Object.values(clients);
  const dc=a.filter(c=>done[c.id]).length;
  return{total:a.length,done:dc,todo:a.length-dc,pct:a.length?Math.round(dc/a.length*100):0};
}
function pStats(p){
  const done=getDone();
  const a=Object.values(clients).filter(c=>c.person===p);
  const dc=a.filter(c=>done[c.id]).length;
  return{total:a.length,done:dc,todo:a.length-dc,pct:a.length?Math.round(dc/a.length*100):0};
}
function aStats(p){
  const done=getDone();const m={};
  Object.values(clients).filter(c=>c.person===p).forEach(c=>{
    if(!m[c.area])m[c.area]={done:0,total:0};
    m[c.area].total++;if(done[c.id])m[c.area].done++;
  });return m;
}

function renderOverview(){
  const s=stats();
  const minfo=MONTHS.find(m=>m.key===viewMonth);
  const mlabel=isCurrentMonth()?'本月':minfo?`${minfo.year}年${minfo.month}月`:'';
  const persons=[...new Set(Object.values(clients).map(c=>c.person))];
  function aRows(areas){return Object.entries(areas).sort((a,b)=>a[0].localeCompare(b[0],['zh'])).map(([a,v])=>{
    const pct=Math.round(v.done/v.total*100);
    return`<div class="ar"><span class="ardot ${pct===100?'dg':pct>0?'da':'dr'}"></span><span class="ar-name">${a}</span><span class="ar-cnt">${v.done}/${v.total}</span></div>`;
  }).join('');}
  document.getElementById('v1').innerHTML=`
    ${!isCurrentMonth()?`<div style="background:var(--abg);color:var(--atxt);font-size:13px;font-weight:600;text-align:center;padding:8px;border-radius:var(--r);margin-bottom:10px">📋 查看模式：${mlabel}（唯讀）</div>`:''}
    <div class="ov-stat">
      <h3>${mlabel} 進度</h3>
      <div class="ov-nums"><span class="ov-big">${s.done}</span>
        <span class="ov-rest">/ ${s.total} 已完成 · 尚餘 <b>${s.todo}</b> 筆</span></div>
      <div class="pbar"><div class="pbar-fill" style="width:${s.pct}%"></div></div>
      <div class="pbar-pct">${s.pct}%</div>
    </div>
    ${persons.map(p=>{const ps=pStats(p);return`
    <div class="psec">
      <div class="psec-hd"><span class="psec-name">${p}</span><span class="psec-stat">${ps.done}/${ps.total} · 剩 ${ps.todo}</span></div>
      <div class="psec-bar"><div class="psec-fill" style="width:${ps.pct}%"></div></div>
      ${aRows(aStats(p))}
    </div>`;}).join('')}
    ${isCurrentMonth()?`<div class="row-btns">
      <button class="btn-ghost" onclick="switchView('2')">查看未完成清單 →</button>
      <button class="btn-ghost btn-danger" onclick="resetMonth()">重設本月</button>
    </div>`:''}`;
}

function buildFilters(){
  const areas=[...new Set(Object.values(clients).map(c=>c.area))].sort((a,b)=>a[0].localeCompare(b[0],['zh']));
  const persons=[...new Set(Object.values(clients).map(c=>c.person))];
  document.getElementById('fbar').innerHTML=
    `<button class="chip on" data-t="s" data-v="all">全部</button>
     <button class="chip" data-t="s" data-v="todo">未抄表</button>
     <button class="chip" data-t="s" data-v="done">已抄表</button>
     ${persons.map(p=>`<button class="chip" data-t="p" data-v="${p}">${p}</button>`).join('')}
     ${areas.map(a=>`<button class="chip" data-t="a" data-v="${a}">${a}</button>`).join('')}`;
  document.getElementById('fbar').querySelectorAll('.chip').forEach(btn=>{
    btn.onclick=()=>{
      const t=btn.dataset.t,v=btn.dataset.v;
      document.querySelectorAll(`.chip[data-t="${t}"]`).forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      if(t==='s')curS=v;if(t==='p')curP=v;
      if(t==='a'){curA=(curA===v)?'all':v;if(curA==='all')btn.classList.remove('on');}
      renderList();
    };
  });
}

function renderList(){
  const done=getDone();
  const q=document.getElementById('search').value.trim().toLowerCase();
  const arr=Object.values(clients).filter(c=>{
    if(curP!=='all'&&c.person!==curP)return false;
    if(curA!=='all'&&c.area!==curA)return false;
    if(curS==='done'&&!done[c.id])return false;
    if(curS==='todo'&&done[c.id])return false;
    if(q&&!c.name.toLowerCase().includes(q)&&!c.id.toLowerCase().includes(q))return false;
    return true;
  });
  // Badge: show current month's undone count
  const curDone=doneCache[TODAY_MKEY]||{};
  const tc=Object.values(clients).filter(c=>!curDone[c.id]).length;
  const nb=document.getElementById('nbdot');
  nb.style.display=tc>0&&isCurrentMonth()?'block':'none';nb.textContent=tc>99?'99+':tc;
  if(!arr.length){document.getElementById('list-out').innerHTML='<div class="empty">沒有符合的客戶</div>';return;}
  const groups={};
  arr.forEach(c=>{if(!groups[c.area])groups[c.area]=[];groups[c.area].push(c);});
  let html='';
  Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0],['zh'])).forEach(([area,cs])=>{
    const dc=cs.filter(c=>done[c.id]).length;
    html+=`<div class="shd">${area} ${dc}/${cs.length}</div>`;
    cs.forEach(c=>{
      const d=done[c.id];
      html+=`<div class="ci ${d?'done':''}" onclick="openModal('${c.id}')">
        <div class="ck ${d?'ok':''}">
          ${d?`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`:''}
        </div>
        <div class="ci-body">
          <div class="ci-name">${c.name}</div>
          <div class="ci-sub">${c.id}${d?' · '+d.by+' '+d.time:''}</div>
        </div>
        ${c.note?`<span class="badge ba">${c.note}</span>`:''}
        <span class="badge ${d?'bg':'br'}">${d?'已抄':'未抄'}</span>
      </div>`;
    });
  });
  document.getElementById('list-out').innerHTML=html;
}

function renderAll(){renderOverview();renderList();}

function openModal(id){
  const c=clients[id];if(!c)return;
  const isReadonly=!isCurrentMonth();
  const done=getDone();const info=done[id];
  pendingId=id;
  document.getElementById('m-name').textContent=c.name;
  const minfo=MONTHS.find(m=>m.key===viewMonth);
  const mlabel=isCurrentMonth()?'本月':minfo?`${minfo.year}年${minfo.month}月`:'';
  document.getElementById('m-meta').innerHTML=
    `${c.id} ｜ ${c.area} ｜ ${c.person}`+
    (c.note?` ｜ <span style="color:var(--amber);font-weight:600">${c.note}抄表</span>`:'')+
    (!isCurrentMonth()?`<br><span style="color:var(--amber)">📋 ${mlabel} 查看模式（唯讀）</span>`:'')+ 
    (info?`<br><span class="done-info">✅ ${info.by} 抄表於 ${info.time}</span>`:'');
  document.getElementById('m-confirm').style.display=isReadonly?'none':'';
  document.getElementById('m-undo').style.display=(info&&!isReadonly)?'block':'none';
  document.getElementById('m-confirm').textContent=info?'重新確認':'✓ 確認已抄表';
  document.getElementById('ov').classList.add('on');
}

function closeModal(){document.getElementById('ov').classList.remove('on');pendingId=null;}

async function confirmModal(){
  if(!pendingId||!isCurrentMonth())return;
  if(!myName){closeModal();showPicker();return;}
  const c=clients[pendingId];
  const ts=nowTs();
  if(!doneCache[TODAY_MKEY])doneCache[TODAY_MKEY]={};
  doneCache[TODAY_MKEY][pendingId]={by:myName,time:ts};
  renderAll();closeModal();stopScan();
  setSyncState('spin','同步中…');
  await apiCall({action:'markDone',id:pendingId,name:c.name,area:c.area,by:myName,month:TODAY_MKEY});
  setSyncState('ok',nowTs().split(' ')[1]+' 已同步');
}

async function undoModal(){
  if(!pendingId||!isCurrentMonth())return;
  if(doneCache[TODAY_MKEY])delete doneCache[TODAY_MKEY][pendingId];
  renderAll();closeModal();
  setSyncState('spin','同步中…');
  await apiCall({action:'unmark',id:pendingId,month:TODAY_MKEY});
  setSyncState('ok','已同步');
}

function showPicker(){
  document.getElementById('eng-list').innerHTML=ENGINEERS.filter(n=>n.trim()).map(n=>
    `<button class="eng-btn" onclick="selectName('${n}')"><div class="eng-icon">👤</div>${n}</button>`
  ).join('');
  document.getElementById('picker').classList.add('on');
}

function selectName(n){
  myName=n;localStorage.setItem(LSKEY,n);
  document.getElementById('name-pill').textContent=n;
  document.getElementById('picker').classList.remove('on');
}

function switchView(n){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v'+n).classList.add('on');
  document.querySelectorAll('.nb').forEach(b=>{b.classList.remove('on');if(b.dataset.v===n)b.classList.add('on');});
  if(n!=='3')stopScan();
  // Update scan tab note
  if(n==='3'){
    const t=new Date();
    document.getElementById('scan-month-note').textContent=
      `📅 掃描將記錄到：${t.getFullYear()}年${t.getMonth()+1}月（當月）`;
  }
}

function resetMonth(){
  if(!confirm('確定清除本月所有抄表記錄？\n此操作不會刪除雲端 Sheet 資料，請手動到 Google Sheet 刪除本月資料列。'))return;
  doneCache[TODAY_MKEY]={};renderAll();
}

// QR Scanner - hybrid: native BarcodeDetector + jsQR fallback
let nativeDetector=null;
let scanAttempts=0;
let videoStream=null;

async function startScan(){
  if(!navigator.mediaDevices?.getUserMedia){document.getElementById('smsg').textContent='⚠️ 無法取得相機，請用手動輸入';return;}
  document.getElementById('vid-wrap').style.display='block';
  document.getElementById('btn-scan').style.display='none';
  document.getElementById('btn-stop').style.display='block';
  document.getElementById('smsg').textContent='相機啟動中…';
  scanAttempts=0;
  // Try native BarcodeDetector (iOS 17+, Android Chrome)
  if('BarcodeDetector' in window){
    try{
      const formats=await BarcodeDetector.getSupportedFormats();
      if(formats.includes('qr_code')){
        nativeDetector=new BarcodeDetector({formats:['qr_code']});
      }
    }catch(e){nativeDetector=null;}
  }
  try{
    // High-resolution back camera with continuous focus
    videoStream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:'environment'},
        width:{ideal:1920},
        height:{ideal:1080},
        focusMode:'continuous',
        advanced:[{focusMode:'continuous'}]
      },
      audio:false
    });
    const v=document.getElementById('qr-vid');
    v.srcObject=videoStream;
    await v.play();
    scanActive=true;
    document.getElementById('smsg').textContent=
      (nativeDetector?'🚀 原生掃描器':'掃描中')+'｜將 QR 對準綠框';
    requestAnimationFrame(scanFrame);
  }catch(e){
    document.getElementById('smsg').textContent='⚠️ 相機錯誤：'+e.message;
    stopScan();
  }
}

async function scanFrame(){
  if(!scanActive)return;
  const v=document.getElementById('qr-vid'),cv=document.getElementById('qr-cv');
  if(v.readyState===v.HAVE_ENOUGH_DATA){
    let detected=null;
    // Try native first (much faster + more accurate)
    if(nativeDetector){
      try{
        const codes=await nativeDetector.detect(v);
        if(codes&&codes.length>0)detected=codes[0].rawValue;
      }catch(e){}
    }
    // Fallback: jsQR with both inversion attempts
    if(!detected&&window.jsQR){
      cv.width=v.videoWidth;cv.height=v.videoHeight;
      const ctx=cv.getContext('2d',{willReadFrequently:true});
      ctx.drawImage(v,0,0);
      const img=ctx.getImageData(0,0,cv.width,cv.height);
      const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'attemptBoth'});
      if(code?.data)detected=code.data;
    }
    if(detected){
      const raw=detected.trim();
      const id=raw.toUpperCase();
      if(clients[id]){
        if(viewMonth!==TODAY_MKEY){viewMonth=TODAY_MKEY;buildMonthBar();}
        scanActive=false;
        document.getElementById('smsg').textContent='✅ 找到：'+clients[id].name;
        if(navigator.vibrate)navigator.vibrate(100);
        openModal(id);return;
      }else{
        // QR detected but not matching - show what was scanned
        document.getElementById('smsg').textContent=`⚠️ 掃到「${raw}」但不在客戶清單中`;
        scanActive=false;
        setTimeout(()=>{if(document.getElementById('btn-stop').style.display==='block'){scanActive=true;requestAnimationFrame(scanFrame);}},2000);
        return;
      }
    }
    scanAttempts++;
    if(scanAttempts%30===0){
      document.getElementById('smsg').textContent=
        (nativeDetector?'🚀 原生掃描器':'掃描中')+`｜已嘗試 ${scanAttempts} 次…若掃不到請按「停止掃描」改用手動輸入`;
    }
  }
  scanRaf=requestAnimationFrame(scanFrame);
}

function stopScan(){
  scanActive=false;if(scanRaf)cancelAnimationFrame(scanRaf);
  const v=document.getElementById('qr-vid');
  if(v.srcObject)v.srcObject.getTracks().forEach(t=>t.stop());v.srcObject=null;
  document.getElementById('vid-wrap').style.display='none';
  document.getElementById('btn-scan').style.display='flex';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('smsg').textContent='';
}

// Events
document.getElementById('btn-scan').onclick=startScan;
document.getElementById('btn-stop').onclick=stopScan;
document.getElementById('m-cancel').onclick=closeModal;
document.getElementById('m-confirm').onclick=confirmModal;
document.getElementById('m-undo').onclick=undoModal;
document.getElementById('search').oninput=renderList;
document.getElementById('btn-man').onclick=()=>{
  const v=document.getElementById('man-in').value.trim().toUpperCase();
  if(clients[v]){
    if(viewMonth!==TODAY_MKEY){viewMonth=TODAY_MKEY;buildMonthBar();}
    openModal(v);
  }else alert('找不到：'+v);
};
document.getElementById('man-in').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-man').click();});
document.querySelectorAll('.nb').forEach(b=>b.onclick=()=>switchView(b.dataset.v));

// Init
if(myName)document.getElementById('name-pill').textContent=myName;
const t=new Date();
document.getElementById('scan-month-note').textContent=`📅 掃描將記錄到：${t.getFullYear()}年${t.getMonth()+1}月（當月）`;
buildMonthBar();
buildFilters();
loadCloud();
setInterval(loadCloud,60000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadCloud();});
if(!myName)setTimeout(showPicker,600);
</script>
